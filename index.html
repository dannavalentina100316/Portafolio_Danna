<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis Proyectos | Portafolio de Estudiante</title>

<style>

:root {
    --primary: #6f1238;
    --secondary: #8b204d;
    --accent: #b53b6a;
    --gold: #d4a373;
    --gold-light: #e8c39e;
    --gold-pastel: #f5e3d3;
    --light-accent: #f0d8e2;
    --dark: #3b071d;
    --light: #fff7fa;
    --white: #ffffff;
    --gray: #6b4b58;

    --gradient-main: linear-gradient(135deg, #6f1238, #b53b6a);
    --gradient-card: linear-gradient(135deg, #8b204d, #d4a373);
}


* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.6;
    color: var(--dark);
    background-color: var(--light);
}


.container {
    max-width: 1200px;
    margin: auto;
    padding: 0 20px;
}


/* ========= HEADER ========= */

.header {
    background: var(--gradient-main);
    color: var(--white);
    padding: 50px 0;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(111,18,56,.35);
}


.header::before {
    content: "";
    position: absolute;
    top: -50%;
    right: -20%;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: rgba(181,59,106,.18);
}


.header::after {
    content:"";
    position:absolute;
    bottom:-40%;
    left:-10%;
    width:250px;
    height:250px;
    border-radius:50%;
    background: rgba(111,18,56,.15);
}


.titulo {
    font-size: 2.8rem;
    margin-bottom: 10px;
    letter-spacing: 2px;
    position: relative;
    z-index: 1;
}


.subtitulo {
    font-size: 1.3rem;
    position: relative;
    z-index: 1;
}


.emoji-deco {
    font-size: 2.5rem;
    display:block;
    margin-top:10px;
    position:relative;
    z-index:1;
}


/* ========= HERO ========= */


.hero {
    background: white;
    padding: 50px 0;
    text-align:center;
    border-bottom: 3px solid var(--gold-pastel);
}


.hero h2 {

    font-size: 2.2rem;
    background: var(--gradient-main);
    -webkit-background-clip:text;
    -webkit-text-fill-color: transparent;
}


.hero p {
    color: var(--gray);
    font-size:1.1rem;
    margin-top:10px;
}


/* ========= MAIN ========= */

.main {
    padding:60px 0;
}


.section-title {

    font-size:2.2rem;
    text-align:center;
    color:var(--primary);
    margin-bottom:45px;

}


.section-title::after {

content:"";
display:block;
width:80px;
height:4px;
margin:12px auto;
border-radius:10px;
background:var(--gradient-main);

}


.galeria {

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:35px;

}
